name: Staleness Check

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  check-staleness:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml feedparser requests

      - name: Run staleness check
        run: python .github/scripts/check_staleness.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Regenerate OPML
        run: pip install pyyaml && python generate_opml.py

      - name: Commit updated OPML if changed
        run: |
          git config user.name "ai-signal-bot"
          git config user.email "bot@ai-signal"
          git add sources.opml
          git diff --staged --quiet || git commit -m "chore: regenerate OPML [skip ci]"
          git push || true
